<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>사진 업로드 테스트</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #222;
    }

    .wrap {
      max-width: 900px;
      margin: 60px auto;
      background: #fff;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    h1, h2 {
      margin-top: 0;
    }

    .row {
      margin-bottom: 16px;
    }

    input[type="file"] {
      display: block;
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 10px;
      background: #fff;
    }

    button {
      border: 0;
      background: #111827;
      color: white;
      padding: 12px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      margin-top: 18px;
      padding: 14px;
      background: #f3f4f6;
      border-radius: 10px;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .preview {
      margin-top: 20px;
    }

    .preview img {
      max-width: 100%;
      border-radius: 12px;
      border: 1px solid #ddd;
      margin-top: 8px;
    }

    .gallery {
      margin-top: 40px;
    }

    .photo-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .card {
      border: 1px solid #ddd;
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
      background: #eee;
    }

    .card-body {
      padding: 12px;
    }

    .name {
      font-weight: bold;
      margin-bottom: 8px;
      word-break: break-all;
    }

    .meta {
      font-size: 13px;
      color: #555;
      line-height: 1.5;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>사진 업로드 테스트</h1>
    <p>테스트</p>

    <div class="row">
      <input type="file" id="fileInput" accept="image/*" />
    </div>

    <button id="uploadBtn">업로드</button>

    <div class="status" id="status">대기 중</div>

    <div class="preview" id="preview"></div>

    <div class="gallery">
      <h2>업로드 목록</h2>
      <div class="photo-list" id="photoList"></div>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById("fileInput");
    const uploadBtn = document.getElementById("uploadBtn");
    const statusBox = document.getElementById("status");
    const preview = document.getElementById("preview");
    const photoList = document.getElementById("photoList");

    async function loadPhotos() {
      try {
        const response = await fetch("/api/photos");
        const photos = await response.json();

        photoList.innerHTML = "";

        if (!photos.length) {
          photoList.innerHTML = "<p>업로드된 사진이 없습니다.</p>";
          return;
        }

        photos.reverse().forEach(photo => {
          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML = `
            <img src="${photo.imageUrl}" alt="${photo.originalName}">
            <div class="card-body">
              <div class="name">${photo.originalName}</div>
              <div class="meta">
                ID: ${photo.id}<br>
                크기: ${photo.fileSize}<br>
                업로드: ${photo.createdAt}
              </div>
            </div>
          `;
          photoList.appendChild(card);
        });
      } catch (error) {
        photoList.innerHTML = "<p>목록을 불러오지 못했습니다.</p>";
      }
    }

    uploadBtn.addEventListener("click", async () => {
      const file = fileInput.files[0];

      if (!file) {
        statusBox.textContent = "파일을 먼저 선택하세요.";
        return;
      }

      const formData = new FormData();
      formData.append("file", file);

      uploadBtn.disabled = true;
      statusBox.textContent = "업로드 중...";
      preview.innerHTML = "";

      try {
        const response = await fetch("/api/photos/upload", {
          method: "POST",
          body: formData
        });

        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.message || "업로드 실패");
        }

        statusBox.textContent = [
          "업로드 성공",
          `ID: ${result.id}`,
          `원본 파일명: ${result.originalName}`,
          `저장 키: ${result.storageKey}`,
          `파일 크기: ${result.size}`,
          `조회 URL: ${result.imageUrl}`
        ].join("\n");

        preview.innerHTML = `
          <h2>방금 업로드한 이미지</h2>
          <img src="${result.imageUrl}" alt="uploaded image" />
        `;

        fileInput.value = "";
        await loadPhotos();
      } catch (error) {
        statusBox.textContent = `오류: ${error.message}`;
      } finally {
        uploadBtn.disabled = false;
      }
    });

    loadPhotos();
  </script>
</body>
</html>
